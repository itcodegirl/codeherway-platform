# ═══════════════════════════════════════════════
# NETLIFY CONFIG — Deploy settings
# ═══════════════════════════════════════════════

[build]
  # For static deploy (drag & drop): leave command empty, publish = "dist"
  # For Git deploy with build step: uncomment the command
  # command = "npm install && npm run build"
  publish = "dist"

# SPA routing — all paths serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
